{% extends "staff/base.html" %}
{% block title %}Kho sách - Nhân viên{% endblock %}
{% block page_title %}<i class="bi bi-journal-richtext"></i> Quản lý Kho sách{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center"><span>Danh sách sách</span>
        <button class="btn btn-warning btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Thêm sách</button></div>
    <div class="card-body p-0"><div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>Bìa</th><th>Tên sách</th><th>ISBN</th><th>Giá</th><th>Tồn kho</th><th>Ngôn ngữ</th><th>Thao tác</th></tr></thead>
            <tbody id="data-body"></tbody>
        </table>
    </div></div>
</div>
<div id="data-pager" class="mt-3"></div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modal-title">Thêm sách</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form class="row g-3"><input type="hidden" id="editId">
        <div class="col-md-4"><label class="form-label">ISBN *</label><input type="text" class="form-control" id="f-isbn" required></div>
        <div class="col-md-8"><label class="form-label">Tên sách *</label><input type="text" class="form-control" id="f-title" required></div>
        <div class="col-12"><label class="form-label">Mô tả</label><textarea class="form-control" id="f-description" rows="2"></textarea></div>
        <div class="col-md-4"><label class="form-label">Giá *</label><input type="number" step="0.01" class="form-control" id="f-price" required></div>
        <div class="col-md-4"><label class="form-label">Giá KM</label><input type="number" step="0.01" class="form-control" id="f-discount_price"></div>
        <div class="col-md-4"><label class="form-label">Giá gốc</label><input type="number" step="0.01" class="form-control" id="f-cost_price"></div>
        <div class="col-md-3"><label class="form-label">Tồn kho</label><input type="number" class="form-control" id="f-stock" value="0"></div>
        <div class="col-md-3"><label class="form-label">Số trang</label><input type="number" class="form-control" id="f-pages"></div>
        <div class="col-md-3"><label class="form-label">Ngôn ngữ</label><input type="text" class="form-control" id="f-language" value="vi"></div>
        <div class="col-md-3"><label class="form-label">Định dạng</label><select class="form-select" id="f-format"><option value="paperback">Bìa mềm</option><option value="hardcover">Bìa cứng</option><option value="ebook">E-book</option></select></div>
        <div class="col-md-4"><label class="form-label">Ngày XB</label><input type="date" class="form-control" id="f-published_date"></div>
        <div class="col-md-4"><label class="form-label">Publisher ID</label><input type="number" class="form-control" id="f-publisher_id"></div>
        <div class="col-md-4"><label class="form-label">Ảnh bìa (URL)</label><input type="url" class="form-control" id="f-cover_image"></div>
        <div class="col-md-6"><label class="form-label">Author IDs (JSON)</label><input type="text" class="form-control" id="f-author_ids" placeholder="[1, 2]"></div>
        <div class="col-md-6"><label class="form-label">Category IDs (JSON)</label><input type="text" class="form-control" id="f-category_ids" placeholder="[1, 3]"></div>
    </form></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-warning" onclick="saveItem()">Lưu</button></div>
</div></div></div>
{% endblock %}
{% block scripts %}
<script>
const ENDPOINT='/books/';const TF=['isbn','title','description','language','format','published_date','cover_image'];const NF=['price','discount_price','cost_price','stock','pages','publisher_id'];
let curPage=1;const PER_PAGE=20;
async function loadData(p){curPage=p||1;try{const data=await apiFetch(ENDPOINT+'?page='+curPage);const items=data.results||data;const count=data.count||items.length;
    document.getElementById('data-body').innerHTML=items.length?items.map(r=>`<tr><td>${r.id}</td><td>${r.cover_image?`<img src="${escapeHtml(r.cover_image)}" style="height:40px">`:'-'}</td><td>${escapeHtml(r.title)}</td><td>${escapeHtml(r.isbn||'-')}</td><td>${formatMoney(r.price)}</td><td><span class="badge ${r.stock>5?'bg-success':r.stock>0?'bg-warning':'bg-danger'}">${r.stock}</span></td><td>${escapeHtml(r.language||'-')}</td>
    <td><button class="btn btn-outline-primary btn-action" onclick='editItem(${JSON.stringify(r).replace(/\x27/g,"&#39;")})'><i class="bi bi-pencil"></i></button><button class="btn btn-outline-danger btn-action" onclick="deleteItem(${r.id})"><i class="bi bi-trash"></i></button></td></tr>`).join(''):'<tr><td colspan="8" class="text-center text-muted py-4">Chưa có sách</td></tr>';
renderPagination('data-pager',count,curPage,PER_PAGE,'loadData');}catch(e){showToast('Lỗi','danger');}hideLoading();}
function openModal(item){document.getElementById('editId').value=item?item.id:'';document.getElementById('modal-title').textContent=item?'Sửa sách':'Thêm sách';TF.forEach(f=>{document.getElementById('f-'+f).value=item?(item[f]??''):'';});NF.forEach(f=>{document.getElementById('f-'+f).value=item?(item[f]!=null?item[f]:''):'';});document.getElementById('f-author_ids').value=item&&item.author_ids?JSON.stringify(item.author_ids):'';document.getElementById('f-category_ids').value=item&&item.category_ids?JSON.stringify(item.category_ids):'';if(!item){document.getElementById('f-stock').value='0';document.getElementById('f-language').value='vi';document.getElementById('f-format').value='paperback';}new bootstrap.Modal(document.getElementById('formModal')).show();}
function editItem(item){openModal(item);}
async function saveItem(){const id=document.getElementById('editId').value;const body={};TF.forEach(f=>{const v=document.getElementById('f-'+f).value;if(v!==''||!id)body[f]=v;});NF.forEach(f=>{const v=document.getElementById('f-'+f).value;if(v!==''||!id)body[f]=v===''?null:parseFloat(v);});const ai=document.getElementById('f-author_ids').value;if(ai)try{body.author_ids=JSON.parse(ai);}catch(e){}const ci=document.getElementById('f-category_ids').value;if(ci)try{body.category_ids=JSON.parse(ci);}catch(e){}
try{if(id)await apiFetch(`${ENDPOINT}${id}/`,{method:'PATCH',body});else await apiFetch(ENDPOINT,{method:'POST',body});bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();showToast(id?'Đã cập nhật':'Đã thêm');loadData();}catch(e){showToast(JSON.stringify(e.data||'Lỗi'),'danger');}}
async function deleteItem(id){if(!confirm('Chắc chắn xóa?'))return;try{await apiFetch(`${ENDPOINT}${id}/`,{method:'DELETE'});showToast('Đã xóa');loadData();}catch(e){showToast('Lỗi','danger');}}
loadData();
</script>
{% endblock %}
