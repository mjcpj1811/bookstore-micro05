{% extends "manager/base.html" %}
{% block title %}Thể loại - Quản lý{% endblock %}
{% block page_title %}<i class="bi bi-tags"></i> Quản lý Thể loại{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center"><span>Danh sách thể loại</span>
        <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Thêm</button></div>
    <div class="card-body p-0"><div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>Tên</th><th>Slug</th><th>Mô tả</th><th>Thứ tự</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
            <tbody id="data-body"></tbody>
        </table>
    </div></div>
</div>
<div id="data-pager" class="mt-3"></div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modal-title">Thêm thể loại</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form class="row g-3"><input type="hidden" id="editId">
        <div class="col-md-6"><label class="form-label">Tên *</label><input type="text" class="form-control" id="f-name" required></div>
        <div class="col-md-6"><label class="form-label">Slug</label><input type="text" class="form-control" id="f-slug"></div>
        <div class="col-12"><label class="form-label">Mô tả</label><textarea class="form-control" id="f-description" rows="2"></textarea></div>
        <div class="col-md-4"><label class="form-label">Danh mục cha (ID)</label><input type="number" class="form-control" id="f-parent_category"></div>
        <div class="col-md-4"><label class="form-label">Thứ tự hiển thị</label><input type="number" class="form-control" id="f-display_order" value="0"></div>
        <div class="col-md-4"><label class="form-label">Icon URL</label><input type="url" class="form-control" id="f-icon_url"></div>
        <div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" id="f-is_active" checked><label class="form-check-label" for="f-is_active">Hoạt động</label></div></div>
    </form></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary" onclick="saveItem()">Lưu</button></div>
</div></div></div>
{% endblock %}
{% block scripts %}
<script>
const EP='/catalog/categories/';
let curPage=1;const PER_PAGE=20;
async function loadData(p){curPage=p||1;try{const data=await apiFetch(EP+'?page='+curPage);const items=data.results||data;const count=data.count||items.length;
    document.getElementById('data-body').innerHTML=items.length?items.map(r=>`<tr><td>${r.id}</td><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.slug||'-')}</td><td>${escapeHtml((r.description||'').substring(0,50))}</td><td>${r.display_order||0}</td><td>${r.is_active!==false?'<span class="badge bg-success">Đang dùng</span>':'<span class="badge bg-secondary">Ẩn</span>'}</td>
    <td><button class="btn btn-outline-primary btn-action" onclick='editItem(${JSON.stringify(r).replace(/\x27/g,"&#39;")})'><i class="bi bi-pencil"></i></button><button class="btn btn-outline-danger btn-action" onclick="deleteItem(${r.id})"><i class="bi bi-trash"></i></button></td></tr>`).join(''):'<tr><td colspan="7" class="text-center text-muted py-4">Chưa có</td></tr>';
renderPagination('data-pager',count,curPage,PER_PAGE,'loadData');}catch(e){showToast('Lỗi','danger');}hideLoading();}
function openModal(item){document.getElementById('editId').value=item?item.id:'';document.getElementById('modal-title').textContent=item?'Sửa thể loại':'Thêm thể loại';
['name','slug','description','icon_url'].forEach(f=>{document.getElementById('f-'+f).value=item?item[f]||'':'';});
document.getElementById('f-parent_category').value=item?item.parent_category||'':'';document.getElementById('f-display_order').value=item?item.display_order||0:0;
document.getElementById('f-is_active').checked=item?item.is_active!==false:true;
new bootstrap.Modal(document.getElementById('formModal')).show();}
function editItem(item){openModal(item);}
async function saveItem(){const id=document.getElementById('editId').value;const body={name:document.getElementById('f-name').value};
['slug','description','icon_url'].forEach(f=>{const v=document.getElementById('f-'+f).value;if(v)body[f]=v;});
const pc=document.getElementById('f-parent_category').value;if(pc)body.parent_category=parseInt(pc);
body.display_order=parseInt(document.getElementById('f-display_order').value)||0;
body.is_active=document.getElementById('f-is_active').checked;
try{if(id)await apiFetch(`${EP}${id}/`,{method:'PUT',body});else await apiFetch(EP,{method:'POST',body});bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();showToast(id?'Đã cập nhật':'Đã thêm');loadData();}catch(e){showToast(JSON.stringify(e.data||'Lỗi'),'danger');}}
async function deleteItem(id){if(!confirm('Chắc chắn xóa?'))return;try{await apiFetch(`${EP}${id}/`,{method:'DELETE'});showToast('Đã xóa');loadData();}catch(e){showToast('Lỗi','danger');}}
loadData();
</script>
{% endblock %}
