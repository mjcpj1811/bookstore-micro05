{% extends "manager/base.html" %}
{% block title %}Nhân viên - Quản lý{% endblock %}
{% block page_title %}<i class="bi bi-person-badge"></i> Quản lý Nhân viên{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center"><span>Danh sách nhân viên</span>
        <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Thêm NV</button></div>
    <div class="card-body p-0"><div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>Mã NV</th><th>Họ tên</th><th>Email</th><th>Phòng ban</th><th>Chức vụ</th><th>Lương</th><th>Vai trò</th><th>Thao tác</th></tr></thead>
            <tbody id="data-body"></tbody>
        </table>
    </div></div>
</div>
<div id="data-pager" class="mt-3"></div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modal-title">Thêm nhân viên</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form class="row g-3"><input type="hidden" id="editId">
        <div class="col-md-6"><label class="form-label">Username *</label><input type="text" class="form-control" id="f-username" required></div>
        <div class="col-md-6"><label class="form-label">Email *</label><input type="email" class="form-control" id="f-email" required></div>
        <div class="col-md-6"><label class="form-label">Mật khẩu *</label><input type="password" class="form-control" id="f-password"></div>
        <div class="col-md-6"><label class="form-label">Họ tên *</label><input type="text" class="form-control" id="f-full_name" required></div>
        <div class="col-md-6"><label class="form-label">Mã NV *</label><input type="text" class="form-control" id="f-employee_code" required></div>
        <div class="col-md-6"><label class="form-label">SĐT</label><input type="text" class="form-control" id="f-phone_number"></div>
        <div class="col-md-6"><label class="form-label">Phòng ban</label><input type="text" class="form-control" id="f-department"></div>
        <div class="col-md-6"><label class="form-label">Chức vụ</label><input type="text" class="form-control" id="f-position"></div>
        <div class="col-md-4"><label class="form-label">Lương</label><input type="number" step="0.01" class="form-control" id="f-salary"></div>
        <div class="col-md-4"><label class="form-label">Vai trò</label><select class="form-select" id="f-role"><option value="staff">Staff</option><option value="admin">Admin</option></select></div>
        <div class="col-md-4"><label class="form-label">Giới tính</label><select class="form-select" id="f-gender"><option value="">--</option><option value="male">Nam</option><option value="female">Nữ</option><option value="other">Khác</option></select></div>
    </form></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary" onclick="saveItem()">Lưu</button></div>
</div></div></div>
{% endblock %}
{% block scripts %}
<script>
const EP='/staff/';const FIELDS=['username','email','password','full_name','employee_code','phone_number','department','position','salary','role','gender'];
let curPage=1;const PER_PAGE=20;
async function loadData(p){curPage=p||1;try{const data=await apiFetch(EP+'?page='+curPage);const items=data.results||data;const count=data.count||items.length;
    document.getElementById('data-body').innerHTML=items.length?items.map(r=>`<tr><td>${r.id}</td><td>${escapeHtml(r.employee_code)}</td><td>${escapeHtml(r.full_name)}</td><td>${escapeHtml(r.email)}</td><td>${escapeHtml(r.department||'-')}</td><td>${escapeHtml(r.position||'-')}</td><td>${formatMoney(r.salary)}</td><td><span class="badge bg-info">${escapeHtml(r.role)}</span></td>
    <td><button class="btn btn-outline-primary btn-action" onclick='editItem(${JSON.stringify(r).replace(/\x27/g,"&#39;")})'><i class="bi bi-pencil"></i></button><button class="btn btn-outline-danger btn-action" onclick="deleteItem(${r.id})"><i class="bi bi-trash"></i></button></td></tr>`).join(''):'<tr><td colspan="9" class="text-center text-muted py-4">Chưa có</td></tr>';
renderPagination('data-pager',count,curPage,PER_PAGE,'loadData');}catch(e){showToast('Lỗi','danger');}hideLoading();}
function openModal(item){document.getElementById('editId').value=item?item.id:'';document.getElementById('modal-title').textContent=item?'Sửa nhân viên':'Thêm nhân viên';FIELDS.forEach(f=>{const el=document.getElementById('f-'+f);if(el)el.value=item?(f==='password'?'':(item[f]??'')):'';});new bootstrap.Modal(document.getElementById('formModal')).show();}
function editItem(item){openModal(item);}
async function saveItem(){const id=document.getElementById('editId').value;const body={};FIELDS.forEach(f=>{const v=document.getElementById('f-'+f).value;if(v!==''||!id){if(f==='salary')body[f]=v===''?null:parseFloat(v);else body[f]=v;}});
try{if(id)await apiFetch(`${EP}${id}/`,{method:'PATCH',body});else await apiFetch(EP,{method:'POST',body});bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();showToast(id?'Đã cập nhật':'Đã thêm');loadData();}catch(e){showToast(JSON.stringify(e.data||'Lỗi'),'danger');}}
async function deleteItem(id){if(!confirm('Chắc chắn xóa?'))return;try{await apiFetch(`${EP}${id}/`,{method:'DELETE'});showToast('Đã xóa');loadData();}catch(e){showToast('Lỗi','danger');}}
loadData();
</script>
{% endblock %}
