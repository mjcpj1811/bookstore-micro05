{% extends "manager/base.html" %}
{% block title %}Dashboard - Quản lý{% endblock %}
{% block page_title %}<i class="bi bi-speedometer2"></i> Dashboard Quản lý{% endblock %}
{% block content %}
<div class="row g-3 mb-4" id="stats-row"></div>
<div class="row g-3">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-heart-pulse"></i> Trạng thái hệ thống</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Service</th><th>Trạng thái</th></tr></thead>
                    <tbody id="health-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-receipt"></i> Đơn hàng gần đây</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Đơn #</th><th>Khách</th><th>Tổng tiền</th><th>Trạng thái</th></tr></thead>
                    <tbody id="orders-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadDashboard() {
    try {
        const [health, books, customers, orders, staff] = await Promise.all([
            apiFetch('/health/'),
            apiFetch('/books/').catch(()=>({count:0})),
            apiFetch('/customers/').catch(()=>({count:0})),
            apiFetch('/orders/').catch(()=>({count:0,results:[]})),
            apiFetch('/staff/').catch(()=>({count:0})),
        ]);
        const bk = (books.results||books); const cs = (customers.results||customers); const od = (orders.results||orders); const st = (staff.results||staff);
        const stats = [
            {icon:'bi-journal-richtext text-primary', value: bk.length||books.count||0, label:'Sách'},
            {icon:'bi-people text-success', value: cs.length||customers.count||0, label:'Khách hàng'},
            {icon:'bi-receipt text-warning', value: od.length||orders.count||0, label:'Đơn hàng'},
            {icon:'bi-person-badge text-info', value: st.length||staff.count||0, label:'Nhân viên'},
        ];
        document.getElementById('stats-row').innerHTML = stats.map(s => `
            <div class="col-md-3 col-6"><div class="card stat-card">
                <div class="stat-icon"><i class="bi ${s.icon}"></i></div>
                <div class="stat-value">${s.value}</div>
                <div class="stat-label">${s.label}</div>
            </div></div>`).join('');
        document.getElementById('health-body').innerHTML = Object.entries(health).map(([name, info]) => `
            <tr><td>${escapeHtml(name.replace('_SERVICE','').replace(/_/g,' '))}</td>
            <td>${info.status==='up'?'<span class="badge bg-success">UP</span>':'<span class="badge bg-danger">DOWN</span>'}</td></tr>`).join('');
        const recentOrders = (orders.results||[]).slice(0,5);
        document.getElementById('orders-body').innerHTML = recentOrders.length ?
            recentOrders.map(o => `<tr><td>${escapeHtml(o.order_number||o.id)}</td><td>${o.customer_id||'-'}</td><td>${formatMoney(o.final_amount)}</td><td>${statusBadge(o.status)}</td></tr>`).join('') :
            '<tr><td colspan="4" class="text-center text-muted py-3">Chưa có đơn hàng</td></tr>';
    } catch(e) { console.error(e); }
    hideLoading();
}
loadDashboard();
</script>
{% endblock %}
