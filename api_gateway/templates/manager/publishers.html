{% extends "manager/base.html" %}
{% block title %}Nhà xuất bản - Quản lý{% endblock %}
{% block page_title %}<i class="bi bi-building"></i> Quản lý Nhà xuất bản{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center"><span>Danh sách NXB</span>
        <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Thêm</button></div>
    <div class="card-body p-0"><div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>Tên</th><th>Email</th><th>SĐT</th><th>Thành phố</th><th>Quốc gia</th><th>Website</th><th>Thao tác</th></tr></thead>
            <tbody id="data-body"></tbody>
        </table>
    </div></div>
</div>
<div id="data-pager" class="mt-3"></div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modal-title">Thêm NXB</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form class="row g-3"><input type="hidden" id="editId">
        <div class="col-md-6"><label class="form-label">Tên *</label><input type="text" class="form-control" id="f-name" required></div>
        <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="f-email"></div>
        <div class="col-12"><label class="form-label">Mô tả</label><textarea class="form-control" id="f-description" rows="2"></textarea></div>
        <div class="col-md-6"><label class="form-label">Địa chỉ</label><input type="text" class="form-control" id="f-address"></div>
        <div class="col-md-3"><label class="form-label">Thành phố</label><input type="text" class="form-control" id="f-city"></div>
        <div class="col-md-3"><label class="form-label">Quốc gia</label><input type="text" class="form-control" id="f-country"></div>
        <div class="col-md-4"><label class="form-label">SĐT</label><input type="text" class="form-control" id="f-phone_number"></div>
        <div class="col-md-4"><label class="form-label">Website</label><input type="url" class="form-control" id="f-website"></div>
        <div class="col-md-4"><label class="form-label">Logo URL</label><input type="url" class="form-control" id="f-logo_url"></div>
    </form></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary" onclick="saveItem()">Lưu</button></div>
</div></div></div>
{% endblock %}
{% block scripts %}
<script>
const EP='/catalog/publishers/';const FIELDS=['name','email','description','address','city','country','phone_number','website','logo_url'];
let curPage=1;const PER_PAGE=20;
async function loadData(p){curPage=p||1;try{const data=await apiFetch(EP+'?page='+curPage);const items=data.results||data;const count=data.count||items.length;
    document.getElementById('data-body').innerHTML=items.length?items.map(r=>`<tr><td>${r.id}</td><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.email||'-')}</td><td>${escapeHtml(r.phone_number||'-')}</td><td>${escapeHtml(r.city||'-')}</td><td>${escapeHtml(r.country||'-')}</td><td>${r.website?`<a href="${escapeHtml(r.website)}" target="_blank">Link</a>`:'-'}</td>
    <td><button class="btn btn-outline-primary btn-action" onclick='editItem(${JSON.stringify(r).replace(/\x27/g,"&#39;")})'><i class="bi bi-pencil"></i></button><button class="btn btn-outline-danger btn-action" onclick="deleteItem(${r.id})"><i class="bi bi-trash"></i></button></td></tr>`).join(''):'<tr><td colspan="8" class="text-center text-muted py-4">Chưa có</td></tr>';
renderPagination('data-pager',count,curPage,PER_PAGE,'loadData');}catch(e){showToast('Lỗi','danger');}hideLoading();}
function openModal(item){document.getElementById('editId').value=item?item.id:'';document.getElementById('modal-title').textContent=item?'Sửa NXB':'Thêm NXB';FIELDS.forEach(f=>{const el=document.getElementById('f-'+f);if(el)el.value=item?item[f]||'':'';});new bootstrap.Modal(document.getElementById('formModal')).show();}
function editItem(item){openModal(item);}
async function saveItem(){const id=document.getElementById('editId').value;const body={};FIELDS.forEach(f=>{const v=document.getElementById('f-'+f).value;if(v)body[f]=v;});
try{if(id)await apiFetch(`${EP}${id}/`,{method:'PUT',body});else await apiFetch(EP,{method:'POST',body});bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();showToast(id?'Đã cập nhật':'Đã thêm');loadData();}catch(e){showToast(JSON.stringify(e.data||'Lỗi'),'danger');}}
async function deleteItem(id){if(!confirm('Chắc chắn xóa?'))return;try{await apiFetch(`${EP}${id}/`,{method:'DELETE'});showToast('Đã xóa');loadData();}catch(e){showToast('Lỗi','danger');}}
loadData();
</script>
{% endblock %}
