{% extends "manager/base.html" %}
{% block title %}Đơn hàng - Quản lý{% endblock %}
{% block page_title %}<i class="bi bi-receipt"></i> Quản lý Đơn hàng{% endblock %}
{% block content %}
<div class="d-flex gap-2 mb-3">
    <select class="form-select" id="statusFilter" style="max-width:200px" onchange="loadData()">
        <option value="">Tất cả trạng thái</option>
        <option value="pending">Pending</option><option value="confirmed">Confirmed</option>
        <option value="processing">Processing</option><option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option><option value="cancelled">Cancelled</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="bi bi-plus-lg"></i> Tạo đơn</button>
</div>
<div class="card">
    <div class="card-body p-0"><div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>Mã đơn</th><th>Khách (ID)</th><th>Trạng thái</th><th>Tổng tiền</th><th>Thanh toán</th><th>Ngày tạo</th><th>Thao tác</th></tr></thead>
            <tbody id="data-body"></tbody>
        </table>
    </div></div>
</div>
<div id="data-pager" class="mt-3"></div>
<div class="modal fade" id="formModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modal-title">Tạo đơn hàng</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form class="row g-3"><input type="hidden" id="editId">
        <div class="col-md-6"><label class="form-label">Khách hàng (ID) *</label><input type="number" class="form-control" id="f-customer_id" required></div>
        <div class="col-md-6"><label class="form-label">Trạng thái</label><select class="form-select" id="f-status"><option value="pending">Pending</option><option value="confirmed">Confirmed</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option></select></div>
        <div class="col-md-6"><label class="form-label">Địa chỉ giao (ID)</label><input type="number" class="form-control" id="f-shipping_address_id"></div>
        <div class="col-md-6"><label class="form-label">Thanh toán</label><select class="form-select" id="f-payment_method"><option value="cod">COD</option><option value="bank_transfer">Chuyển khoản</option><option value="credit_card">Thẻ tín dụng</option><option value="e_wallet">Ví điện tử</option></select></div>
        <div class="col-md-6"><label class="form-label">Phí giao</label><input type="number" step="0.01" class="form-control" id="f-shipping_fee" value="0"></div>
        <div class="col-md-6"><label class="form-label">Giảm giá</label><input type="number" step="0.01" class="form-control" id="f-discount" value="0"></div>
        <div class="col-12"><label class="form-label">Ghi chú</label><textarea class="form-control" id="f-notes" rows="2"></textarea></div>
        <div class="col-12" id="items-section"><label class="form-label">Sản phẩm</label><div id="items-list"></div>
            <button type="button" class="btn btn-outline-secondary btn-sm mt-1" onclick="addItemRow()"><i class="bi bi-plus"></i> Thêm SP</button></div>
    </form></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary" onclick="saveItem()">Lưu</button></div>
</div></div></div>
{% endblock %}
{% block scripts %}
<script>
const EP='/orders/';
let curPage=1;const PER_PAGE=20;
async function loadData(p){if(typeof p==='number')curPage=p;else curPage=1;try{let url=EP+'?page='+curPage;const f=document.getElementById('statusFilter').value;if(f)url+='&status='+f;
const data=await apiFetch(url);let items=data.results||data;const count=data.count||items.length;
    document.getElementById('data-body').innerHTML=items.length?items.map(r=>`<tr><td>${r.id}</td><td>${escapeHtml(r.order_number||'-')}</td><td>${r.customer_id}</td><td>${statusBadge(r.status)}</td><td>${formatMoney(r.final_amount)}</td><td>${escapeHtml(r.payment_method||'-')}</td><td>${formatDate(r.order_date)}</td>
    <td><button class="btn btn-outline-primary btn-action" onclick='editItem(${JSON.stringify(r).replace(/\x27/g,"&#39;")})'><i class="bi bi-pencil"></i></button><button class="btn btn-outline-danger btn-action" onclick="deleteItem(${r.id})"><i class="bi bi-trash"></i></button></td></tr>`).join(''):'<tr><td colspan="8" class="text-center text-muted py-4">Chưa có</td></tr>';
renderPagination('data-pager',count,curPage,PER_PAGE,'loadData');}catch(e){showToast('Lỗi','danger');}hideLoading();}
let itemIdx=0;
function addItemRow(bk,qty,pr){const d=document.createElement('div');d.className='input-group mb-1';d.innerHTML=`<input type="number" class="form-control" placeholder="Book ID" data-f="book_id" value="${bk||''}"><input type="number" class="form-control" placeholder="SL" data-f="quantity" value="${qty||1}"><input type="number" step="0.01" class="form-control" placeholder="Giá" data-f="price" value="${pr||''}"><button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>`;document.getElementById('items-list').appendChild(d);}
function openModal(item){document.getElementById('editId').value=item?item.id:'';document.getElementById('modal-title').textContent=item?'Sửa đơn hàng':'Tạo đơn hàng';
['customer_id','status','shipping_address_id','payment_method','shipping_fee','discount','notes'].forEach(f=>{const el=document.getElementById('f-'+f);if(el)el.value=item?item[f]||'':'';});
document.getElementById('items-list').innerHTML='';
document.getElementById('items-section').style.display=item?'none':'block';
if(!item)addItemRow();
new bootstrap.Modal(document.getElementById('formModal')).show();}
function editItem(item){openModal(item);}
async function saveItem(){const id=document.getElementById('editId').value;const body={};
['customer_id','shipping_address_id','payment_method','shipping_fee','discount','notes','status'].forEach(f=>{const v=document.getElementById('f-'+f).value;if(v){if(['customer_id','shipping_address_id','shipping_fee','discount'].includes(f))body[f]=parseFloat(v);else body[f]=v;}});
if(!id){const rows=document.querySelectorAll('#items-list .input-group');const items=[];
rows.forEach(row=>{const bid=row.querySelector('[data-f="book_id"]').value;const qty=row.querySelector('[data-f="quantity"]').value;const pr=row.querySelector('[data-f="price"]').value;if(bid&&qty)items.push({book_id:parseInt(bid),quantity:parseInt(qty),unit_price:parseFloat(pr)||0,subtotal:(parseFloat(pr)||0)*parseInt(qty)});});
body.items=items;
body.subtotal=items.reduce((s,it)=>s+it.subtotal,0);
body.final_amount=body.subtotal+(body.shipping_fee||0)-(body.discount||0);}
try{if(id)await apiFetch(`${EP}${id}/`,{method:'PUT',body});else await apiFetch(EP,{method:'POST',body});bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();showToast(id?'Đã cập nhật':'Đã tạo');loadData();}catch(e){showToast(JSON.stringify(e.data||'Lỗi'),'danger');}}
async function deleteItem(id){if(!confirm('Chắc chắn xóa?'))return;try{await apiFetch(`${EP}${id}/`,{method:'DELETE'});showToast('Đã xóa');loadData();}catch(e){showToast('Lỗi','danger');}}
loadData();
</script>
{% endblock %}
