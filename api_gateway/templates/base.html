<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}BookStore{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--gray-900:#0f172a;--radius:.75rem;--transition:all .2s ease}
*{box-sizing:border-box}body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;margin:0;background:var(--gray-50);color:var(--gray-800)}
a{text-decoration:none;color:inherit}
.card{border:none;border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06);background:#fff}
.card-header{background:#fff;border-bottom:1px solid var(--gray-100);padding:.85rem 1.25rem;font-weight:600;border-radius:var(--radius) var(--radius) 0 0}
.btn{border-radius:.5rem;font-weight:500;font-size:.875rem;padding:.45rem 1rem;transition:var(--transition)}
.btn-primary{background:var(--primary);border-color:var(--primary)}.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.table{font-size:.875rem;margin-bottom:0}.table th{font-weight:600;color:var(--gray-600);font-size:.8rem;text-transform:uppercase;letter-spacing:.02em;border-bottom:2px solid var(--gray-100);padding:.65rem .75rem}
.table td{padding:.65rem .75rem;vertical-align:middle;border-bottom:1px solid var(--gray-50)}
.table-hover tbody tr:hover{background:rgba(37,99,235,.02)}
.badge{font-weight:500;padding:.35em .65em;border-radius:.4rem}
.modal-content{border:none;border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{border-bottom:1px solid var(--gray-100)}.modal-footer{border-top:1px solid var(--gray-100)}
.form-control,.form-select{border-radius:.5rem;border:1px solid var(--gray-200);font-size:.875rem;padding:.5rem .75rem}
.form-control:focus,.form-select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-label{font-weight:500;font-size:.82rem;color:var(--gray-600);margin-bottom:.3rem}
.btn-action{padding:.25rem .5rem;font-size:.78rem;border-radius:.4rem;margin:0 .1rem}
#loading{display:none;text-align:center;padding:3rem}#loading.show{display:block}
.toast-container{position:fixed;top:1rem;right:1rem;z-index:9999}
{% block extra_css %}{% endblock %}
</style>
<script>
/* ===== Auth helpers ===== */
function getUser(){try{return JSON.parse(localStorage.getItem('bookstore_user'))}catch(e){return null}}
function getUserRole(){return localStorage.getItem('bookstore_role')||''}
function setUser(data,role){localStorage.setItem('bookstore_user',JSON.stringify(data));localStorage.setItem('bookstore_role',role);}
function requireRole(roles){const r=getUserRole();if(!roles.includes(r)){window.location.href='/login/';return false}return true}
function logout(){localStorage.removeItem('bookstore_user');localStorage.removeItem('bookstore_role');window.location.href='/login/';}

/* ===== API helper ===== */
const API_BASE='/api';
async function apiFetch(path,opts={}){
    const url=API_BASE+path;
    const cfg={method:opts.method||'GET',headers:{'Content-Type':'application/json'}};
    if(opts.body)cfg.body=JSON.stringify(opts.body);
    const resp=await fetch(url,cfg);
    if(resp.status===204)return {};
    const data=await resp.json().catch(()=>({}));
    if(!resp.ok){const err=new Error(resp.statusText);err.status=resp.status;err.data=data;throw err;}
    return data;
}

/* ===== UI helpers ===== */
function escapeHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function formatMoney(v){if(v==null)return'0₫';return Number(v).toLocaleString('vi-VN')+'₫';}
function formatDate(d){if(!d)return'-';return new Date(d).toLocaleDateString('vi-VN');}
function statusBadge(s){const m={pending:'bg-warning text-dark',confirmed:'bg-info',processing:'bg-primary',shipped:'bg-indigo',delivered:'bg-success',cancelled:'bg-danger',refunded:'bg-secondary',completed:'bg-success',failed:'bg-danger'};return`<span class="badge ${m[s]||'bg-secondary'}">${s}</span>`}

/* ===== Behavior tracking ===== */
function trackBehavior(bookId,actionType){
    const u=getUser();if(!u)return;
    apiFetch('/recommendations/behaviors/',{method:'POST',body:{customer_id:u.id,book_id:bookId,action_type:actionType}}).catch(()=>{});
}

/* ===== Pagination helper ===== */
function renderPagination(containerId, count, page, perPage, callback){
    const el=document.getElementById(containerId);
    if(!el)return;
    const total=Math.ceil(count/perPage);
    if(total<=1){el.innerHTML='';return;}
    let h='<nav><ul class="pagination pagination-sm justify-content-center mb-0">';
    h+=`<li class="page-item ${page<=1?'disabled':''}"><a class="page-link" href="#" onclick="event.preventDefault();${callback}(${page-1})">‹</a></li>`;
    let start=Math.max(1,page-2),end=Math.min(total,page+2);
    if(end-start<4){start=Math.max(1,end-4);end=Math.min(total,start+4);}
    if(start>1){h+=`<li class="page-item"><a class="page-link" href="#" onclick="event.preventDefault();${callback}(1)">1</a></li>`;if(start>2)h+='<li class="page-item disabled"><span class="page-link">…</span></li>';}
    for(let i=start;i<=end;i++){h+=`<li class="page-item ${i===page?'active':''}"><a class="page-link" href="#" onclick="event.preventDefault();${callback}(${i})">${i}</a></li>`;}
    if(end<total){if(end<total-1)h+='<li class="page-item disabled"><span class="page-link">…</span></li>';h+=`<li class="page-item"><a class="page-link" href="#" onclick="event.preventDefault();${callback}(${total})">${total}</a></li>`;}
    h+=`<li class="page-item ${page>=total?'disabled':''}"><a class="page-link" href="#" onclick="event.preventDefault();${callback}(${page+1})">›</a></li>`;
    h+='</ul></nav>';
    el.innerHTML=`<div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mt-3 px-3 pb-3"><small class="text-muted">${count} kết quả</small>${h}</div>`;
}
</script>
</head>
<body>
{% block body_content %}{% endblock %}
<div class="toast-container" id="toast-box"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(msg,type='success'){const id='t'+Date.now();document.getElementById('toast-box').insertAdjacentHTML('beforeend',`<div id="${id}" class="toast align-items-center text-bg-${type} border-0 show" role="alert"><div class="d-flex"><div class="toast-body">${escapeHtml(msg)}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`);setTimeout(()=>{const el=document.getElementById(id);if(el)el.remove();},3500);}
function hideLoading(){const el=document.getElementById('loading');if(el)el.classList.remove('show');}
function showLoading(){const el=document.getElementById('loading');if(el)el.classList.add('show');}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
